version: '3.8'

services:
  db:
    image: postgres:16
    container_name: postgres-db-tutorial-seguranca
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: tutorialseguranca
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: